<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Holding · Console</title>
<style>
  :root{
    --plane:#0d0d0d; --surface:#161615; --surface-2:#1c1c1a; --raise:#212120;
    --ink:#ffffff; --ink-2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --baseline:#383835; --border:rgba(255,255,255,0.09); --border-2:rgba(255,255,255,0.14);
    --brand:#e8892b; --link:#3987e5;
    --ok:#0ca30c; --warn:#fab219; --serious:#ec835a; --crit:#d03b3b; --idle:#898781;
    --pri-critical:#d03b3b; --pri-high:#ec835a; --pri-medium:#fab219; --pri-low:#898781;
    --st-done:#0ca30c; --st-progress:#3987e5; --st-review:#fab219; --st-blocked:#d03b3b;
    --sb-w:264px;
    font-synthesis:none;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--plane); color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none}
  .app{display:grid;grid-template-columns:var(--sb-w) 1fr;min-height:100vh}

  /* ---------- Sidebar ---------- */
  .sb{background:#0a0a0a;border-right:1px solid var(--border);padding:14px 12px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 12px}
  .brand .logo{width:28px;height:28px;border-radius:7px;background:var(--brand);display:grid;place-items:center;color:#1a1108;font-weight:800;font-size:16px;flex:none}
  .brand .name{font-weight:700;letter-spacing:.2px}
  .brand .search{margin-left:auto;color:var(--muted);cursor:pointer;opacity:.8}
  .navlink{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:8px;color:var(--ink-2);cursor:pointer}
  .navlink:hover{background:var(--surface)}
  .navlink.active{background:var(--surface-2);color:var(--ink)}
  .navlink .ico{width:16px;text-align:center;opacity:.9;flex:none}
  .navlink .live{margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--link)}
  .navlink .live .dot{width:7px;height:7px;border-radius:50%;background:var(--link);box-shadow:0 0 0 3px rgba(57,135,229,.18)}
  .sec{font-size:10.5px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;padding:14px 8px 5px;display:flex;align-items:center}
  .sec .add{margin-left:auto;cursor:pointer;font-size:14px;line-height:1}
  .item{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px;color:var(--ink-2);cursor:pointer}
  .item:hover{background:var(--surface)}
  .item.active{background:var(--surface-2);color:var(--ink)}
  .cdot{width:9px;height:9px;border-radius:50%;flex:none}
  .item .badge{margin-left:auto}
  .sb-foot{margin-top:auto;border-top:1px solid var(--border);padding-top:10px;color:var(--muted);font-size:12px;display:flex;align-items:center;gap:8px}

  /* ---------- Main ---------- */
  .main{padding:0 30px 60px;max-width:1220px}
  .topbar{display:flex;align-items:center;gap:8px;padding:18px 0 6px;color:var(--muted);font-size:13px;position:sticky;top:0;background:linear-gradient(var(--plane),var(--plane) 70%,transparent);z-index:5}
  .topbar .crumb{color:var(--muted)}
  .topbar .crumb b{color:var(--ink);font-weight:600}
  .topbar .right{margin-left:auto;display:flex;gap:8px;align-items:center}

  .seedbar{display:flex;gap:9px;align-items:flex-start;background:rgba(250,178,25,.08);border:1px solid rgba(250,178,25,.25);color:#f4d38a;border-radius:10px;padding:9px 12px;margin:8px 0 18px;font-size:12.5px}
  .seedbar b{color:var(--warn)}

  h1.page{font-size:22px;margin:6px 0 2px;font-weight:700}
  .sub{color:var(--muted);margin-bottom:20px}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border-radius:9px;border:1px solid var(--border-2);background:var(--surface-2);color:var(--ink);font-size:13px;font-weight:600;cursor:pointer}
  .btn:hover{background:var(--raise)}
  .btn.pri{background:var(--brand);border-color:transparent;color:#1a1108}
  .btn.pri:hover{filter:brightness(1.06)}
  .btn.icon{padding:7px 10px}

  /* pills / chips */
  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;border:1px solid var(--border)}
  .pill .dot{width:7px;height:7px;border-radius:50%}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:7px;font-size:11px;font-weight:600;background:var(--surface-2);border:1px solid var(--border);color:var(--ink-2)}

  /* KPI tiles */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px 16px}
  .tile .k{color:var(--muted);font-size:12px;margin-bottom:8px}
  .tile .v{font-size:26px;font-weight:700;letter-spacing:-.5px}
  .tile .v small{font-size:14px;color:var(--muted);font-weight:600}
  .meter{height:6px;border-radius:4px;background:var(--surface-2);margin-top:10px;overflow:hidden}
  .meter > i{display:block;height:100%;border-radius:4px}

  /* cards / sections */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px}
  .card h3{margin:0 0 12px;font-size:14px;font-weight:700}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .companies{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .co{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px;cursor:pointer}
  .co:hover{border-color:var(--border-2);background:var(--surface-2)}
  .co .top{display:flex;align-items:center;gap:9px;margin-bottom:6px}
  .co .nm{font-weight:700}
  .co .desc{color:var(--muted);font-size:12.5px;min-height:34px}
  .co .foot{display:flex;align-items:center;gap:8px;margin-top:10px;color:var(--muted);font-size:12px}

  /* board table */
  table.board{width:100%;border-collapse:collapse}
  table.board th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:0 10px 8px}
  table.board td{padding:11px 10px;border-top:1px solid var(--border);vertical-align:middle}
  table.board tr.click{cursor:pointer}
  table.board tr.click:hover td{background:var(--surface-2)}
  .role{display:flex;align-items:center;gap:10px}
  .role .av{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:14px;background:var(--surface-2);border:1px solid var(--border);flex:none}
  .role .rr{font-weight:700}
  .role .tt{color:var(--muted);font-size:11.5px}
  .focus{color:var(--ink-2);max-width:360px}
  td.num{font-variant-numeric:tabular-nums;text-align:right;color:var(--ink-2)}

  /* agent detail */
  .ad-head{display:flex;align-items:center;gap:14px;margin:6px 0 20px}
  .ad-head .av{width:52px;height:52px;border-radius:12px;display:grid;place-items:center;font-size:24px;background:var(--surface-2);border:1px solid var(--border);flex:none}
  .ad-head .rr{font-size:22px;font-weight:700}
  .ad-head .tt{color:var(--muted);font-size:13px}
  .ad-head .actions{margin-left:auto;display:flex;gap:8px;align-items:center}
  .run{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px 16px;margin-bottom:22px}
  .run .r1{display:flex;align-items:center;gap:10px;margin-bottom:9px;flex-wrap:wrap}
  .run .r1 .hash{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--ink-2);background:var(--surface-2);padding:2px 7px;border-radius:6px}
  .run .r1 .ago{margin-left:auto;color:var(--muted);font-size:12px}
  .run .msg{color:var(--ink-2)}
  .charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-bottom:22px}
  .chart h4{margin:0;font-size:13px;font-weight:700}
  .chart .rng{color:var(--muted);font-size:11px;margin:1px 0 10px}
  .chart svg{width:100%;height:auto;display:block;overflow:visible}
  .legend{display:flex;flex-wrap:wrap;gap:10px 14px;margin-top:11px}
  .legend .lg{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-2)}
  .legend .lg .sw{width:9px;height:9px;border-radius:2px;flex:none}
  .legend .lg b{color:var(--ink);font-variant-numeric:tabular-nums}
  .issues{display:flex;flex-direction:column}
  .irow{display:flex;align-items:center;gap:12px;padding:11px 8px;border-top:1px solid var(--border)}
  .irow:first-child{border-top:none}
  .irow .key{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;color:var(--muted);width:64px;flex:none}
  .irow .ttl{color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .irow .st{margin-left:auto;flex:none}

  .autow{display:inline-flex;align-items:center;gap:6px}
  .seealso{margin-left:auto;color:var(--link);font-size:12.5px;cursor:pointer}

  /* tooltip + toast */
  #tip{position:fixed;pointer-events:none;background:#000;border:1px solid var(--border-2);border-radius:8px;padding:6px 9px;font-size:12px;color:var(--ink);opacity:0;transition:opacity .08s;z-index:50;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.5)}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#000;border:1px solid var(--border-2);border-radius:10px;padding:10px 16px;color:var(--ink);opacity:0;transition:all .18s;z-index:60;max-width:520px}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .err{margin:40px auto;max-width:560px;background:var(--surface);border:1px solid var(--crit);border-radius:12px;padding:20px;color:var(--ink-2)}
  @media(max-width:820px){.app{grid-template-columns:1fr}.sb{position:static;height:auto}.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="sb">
    <div class="brand">
      <div class="logo">◪</div>
      <div class="name">AI Holding</div>
      <div class="search" title="Cerca">⌕</div>
    </div>
    <div class="navlink" data-nav="new" ><span class="ico">✎</span> Nuova Issue</div>
    <div class="navlink" data-route="#/overview"><span class="ico">▦</span> Dashboard <span class="live" id="nav-live" hidden><span class="dot"></span><span></span></span></div>
    <div class="navlink" data-nav="inbox"><span class="ico">✉</span> Inbox</div>
    <a class="navlink" href="/board/" target="_blank" rel="noopener"><span class="ico">◎</span> Boardroom <span style="margin-left:auto;color:var(--muted)">↗</span></a>

    <div class="sec">Aziende <span class="add" data-nav="new-co" title="Nuova azienda">+</span></div>
    <div id="sb-companies"></div>

    <div class="sec">Work</div>
    <div class="navlink" data-nav="issues"><span class="ico">◉</span> Issues</div>
    <div class="navlink" data-nav="goals"><span class="ico">◎</span> Goals</div>

    <div class="sec">Board · C-Level</div>
    <div id="sb-agents"></div>

    <div class="sb-foot">
      <span id="foot-updated">—</span>
    </div>
  </aside>

  <main class="main" id="main"><!-- rendered --></main>
</div>
<div id="tip"></div>
<div id="toast"></div>

<script>
const CO_COLORS = {herbalife:'#e8892b','ai-triage':'#3987e5','ai-friday':'#1baf7a','omar-website':'#9085e9',docbit:'#d55181'};
const AV = {CEO:'♛',CMO:'◈',CTO:'⌘',COO:'◍',CFO:'€',CISO:'⛨'};
const AUTONOMY = {
  supervised:{lab:'Supervised',col:'var(--crit)',ico:'●'},
  delegated:{lab:'Delegated',col:'var(--warn)',ico:'●'},
  autonomous:{lab:'Autonomous',col:'var(--ok)',ico:'●'}
};
const AGENT_STATE = {
  running:{lab:'running',col:'var(--ok)'}, live:{lab:'live',col:'var(--ok)'},
  idle:{lab:'idle',col:'var(--warn)'}, paused:{lab:'paused',col:'var(--muted)'},
  error:{lab:'error',col:'var(--crit)'}, planned:{lab:'planned',col:'var(--link)'}
};
const RUN_STATE = {succeeded:'var(--ok)',running:'var(--link)',failed:'var(--crit)'};
const CO_STATE = {active:'var(--ok)',mvp:'var(--warn)',planned:'var(--link)',paused:'var(--muted)'};
const PRIO = [['critical','Critical','var(--pri-critical)'],['high','High','var(--pri-high)'],['medium','Medium','var(--pri-medium)'],['low','Low','var(--pri-low)']];
const STAT = [['done','Done','var(--st-done)'],['in_progress','In progress','var(--st-progress)'],['in_review','In review','var(--st-review)'],['blocked','Blocked','var(--st-blocked)']];
const ISTAT = {done:['Done','var(--st-done)'],in_progress:['In progress','var(--st-progress)'],in_review:['In review','var(--st-review)'],blocked:['Blocked','var(--st-blocked)']};

let DATA=null;
const $=(s,r=document)=>r.querySelector(s);
const el=(t,a={},...ch)=>{const n=document.createElement(t);for(const k in a){if(k==='class')n.className=a[k];else if(k==='html')n.innerHTML=a[k];else if(k.startsWith('on'))n.addEventListener(k.slice(2),a[k]);else n.setAttribute(k,a[k]);}for(const c of ch){if(c==null)continue;n.append(c.nodeType?c:document.createTextNode(c));}return n;};
const eur=c=>'€'+(c/100).toFixed(2);
const esc=s=>String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

/* ---------- tooltip ---------- */
const tip=$('#tip');
function showTip(e,html){tip.innerHTML=html;tip.style.opacity=1;moveTip(e);}
function moveTip(e){const p=12;let x=e.clientX+p,y=e.clientY+p;const r=tip.getBoundingClientRect();if(x+r.width>innerWidth-8)x=e.clientX-r.width-p;if(y+r.height>innerHeight-8)y=e.clientY-r.height-p;tip.style.left=x+'px';tip.style.top=y+'px';}
function hideTip(){tip.style.opacity=0;}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3200);}
function stub(label){toast(label+' — azione governance stub. Il backend live (Invoke/Pause reali + budget enforced) arriva in fase 2, vedi report CTO.');}

/* ---------- SVG chart helpers ---------- */
const SVGNS='http://www.w3.org/2000/svg';
function svgEl(t,a){const n=document.createElementNS(SVGNS,t);for(const k in a)n.setAttribute(k,a[k]);return n;}
// rounded TOP corners only, base anchored at baseline
function topRoundPath(x,y,w,h,r){r=Math.max(0,Math.min(r,w/2,h));const b=y+h;return `M${x},${b} L${x},${y+r} Q${x},${y} ${x+r},${y} L${x+w-r},${y} Q${x+w},${y} ${x+w},${y+r} L${x+w},${b} Z`;}

// stacked day columns: series=[{key,color}], data rows have those keys
function dayStackChart(rows,series,fmt){
  const W=250,H=104,padB=4,padT=6,n=rows.length,gap=3;
  const bw=(W-(n-1)*gap)/n;
  const totals=rows.map(r=>series.reduce((s,se)=>s+(r[se.key]||0),0));
  const max=Math.max(1,...totals);
  const svg=svgEl('svg',{viewBox:`0 0 ${W} ${H}`,role:'img'});
  const base=H-padB;
  // baseline
  svg.append(svgEl('line',{x1:0,y1:base+.5,x2:W,y2:base+.5,stroke:'var(--baseline)','stroke-width':1}));
  rows.forEach((r,i)=>{
    const x=i*(bw+gap); let yTop=base;
    const segs=series.map(se=>({se,v:r[se.key]||0})).filter(s=>s.v>0);
    segs.forEach((s,si)=>{
      const hh=(s.v/max)*(base-padT);
      let y=yTop-hh; const isTop=si===segs.length-1;
      const p=svgEl('path',{d:topRoundPath(x,y,bw,hh,isTop?2.5:0.5),fill:s.se.color});
      p.style.cursor='default';
      p.addEventListener('mouseenter',e=>showTip(e,fmt(r,segs)));
      p.addEventListener('mousemove',moveTip);p.addEventListener('mouseleave',hideTip);
      svg.append(p);
      yTop=y-2; // 2u surface gap between stacked segments
    });
    // x tick every ~4
    if(i%4===0||i===n-1){svg.append(svgEl('text',{x:x+bw/2,y:H-0.5,'text-anchor':'middle',fill:'var(--muted)','font-size':'7'})).textContent=r.d;}
  });
  return svg;
}
// categorical bars (one bar per category)
function catBars(items){ // items=[{lab,val,color}]
  const W=250,H=104,padB=16,padT=6,n=items.length,gap=10;
  const bw=(W-(n-1)*gap)/n, max=Math.max(1,...items.map(i=>i.val));
  const svg=svgEl('svg',{viewBox:`0 0 ${W} ${H}`,role:'img'});
  const base=H-padB;
  svg.append(svgEl('line',{x1:0,y1:base+.5,x2:W,y2:base+.5,stroke:'var(--baseline)','stroke-width':1}));
  items.forEach((it,i)=>{
    const x=i*(bw+gap), hh=(it.val/max)*(base-padT), y=base-hh;
    const p=svgEl('path',{d:topRoundPath(x,y,bw,Math.max(hh,it.val?2:0),3),fill:it.color});
    if(it.val){p.addEventListener('mouseenter',e=>showTip(e,`<b>${it.lab}</b> · ${it.val}`));p.addEventListener('mousemove',moveTip);p.addEventListener('mouseleave',hideTip);}
    svg.append(p);
    svg.append(svgEl('text',{x:x+bw/2,y:base+11,'text-anchor':'middle',fill:'var(--muted)','font-size':'8'})).textContent=it.val;
  });
  return svg;
}
function legend(items){ // items=[{lab,val,color}]
  const w=el('div',{class:'legend'});
  items.forEach(i=>w.append(el('span',{class:'lg'},el('span',{class:'sw',style:`background:${i.color}`}),i.lab+' ',el('b',{},String(i.val)))));
  return w;
}
function chartCard(title,svg,leg){
  return el('div',{class:'card chart'},el('h4',{},title),el('div',{class:'rng'},'Ultimi 14 giorni'),svg,leg);
}

/* ---------- pills ---------- */
function agentPill(status){const s=AGENT_STATE[status]||AGENT_STATE.idle;return el('span',{class:'pill',style:`color:${s.col};border-color:${s.col}44`},el('span',{class:'dot',style:`background:${s.col}`}),s.lab);}
function autonomyChip(a){const x=AUTONOMY[a]||AUTONOMY.supervised;return el('span',{class:'autow'},el('span',{style:`color:${x.col};font-size:9px`},x.ico),el('span',{style:'color:var(--ink-2)'},x.lab));}
function coStatePill(s){const c=CO_STATE[s]||'var(--muted)';return el('span',{class:'pill',style:`color:${c};border-color:${c}44`},el('span',{class:'dot',style:`background:${c}`}),s);}
function issueStatusPill(s){const [lab,col]=ISTAT[s]||[s,'var(--muted)'];return el('span',{class:'pill',style:`color:${col};border-color:${col}44`},lab);}

/* ---------- sidebar ---------- */
function renderSidebar(){
  const c=$('#sb-companies');c.innerHTML='';
  DATA.companies.forEach(co=>{
    c.append(el('div',{class:'item','data-route':`#/company/${co.id}`,onclick:()=>go(`#/company/${co.id}`)},
      el('span',{class:'cdot',style:`background:${CO_COLORS[co.id]||'var(--muted)'}`}),co.name,
      co.status==='planned'?el('span',{class:'badge',style:'margin-left:auto'},el('span',{class:'chip'},'soon')):null));
  });
  const a=$('#sb-agents');a.innerHTML='';
  DATA.agents.forEach(ag=>{
    const live=(ag.status==='running'||ag.status==='live');
    a.append(el('div',{class:'item','data-route':`#/agent/${ag.id}`,onclick:()=>go(`#/agent/${ag.id}`)},
      el('span',{class:'ico',style:'width:16px;text-align:center'},AV[ag.role]||'•'),ag.role,
      live?el('span',{class:'live',style:'margin-left:auto'},el('span',{class:'dot'}),'live'):null));
  });
  const nlive=DATA.agents.filter(x=>x.status==='running'||x.status==='live').length;
  const nl=$('#nav-live');if(nlive){nl.hidden=false;nl.querySelector('span:last-child').textContent=nlive+' live';}
  $('#foot-updated').textContent='Aggiornato '+DATA.meta.lastUpdated;
}
function markActive(route){document.querySelectorAll('[data-route]').forEach(n=>n.classList.toggle('active',n.getAttribute('data-route')===route));}

/* ---------- overview ---------- */
function viewOverview(){
  const m=DATA.meta, main=$('#main');main.innerHTML='';
  main.append(topbar([['Dashboard',null]]));
  main.append(seedbar());
  main.append(el('h1',{class:'page'},m.holdingName+' — Governance'));
  main.append(el('div',{class:'sub'},'Focus settimana: '+m.weeklyFocus));

  const activeCos=DATA.companies.filter(c=>c.status==='active').length;
  const liveAg=DATA.agents.filter(a=>a.status==='running'||a.status==='live').length;
  const openIssues=DATA.agents.reduce((s,a)=>s+(a.charts.status.in_progress+a.charts.status.in_review+a.charts.status.blocked),0);
  const spentPct=Math.min(100,Math.round(m.spentMonthlyCents/m.budgetMonthlyCents*100));
  const spendCol=spentPct>=100?'var(--crit)':spentPct>=80?'var(--warn)':'var(--ok)';

  main.append(el('div',{class:'kpis'},
    tile('Aziende attive',`${activeCos}`,`/ ${DATA.companies.length} totali`),
    tile('C-Level live',`${liveAg}`,`/ ${DATA.agents.length} board`),
    tile('Issue aperte',`${openIssues}`,'in corso · review · bloccate'),
    tileMeter('Budget mese',eur(m.spentMonthlyCents),`/ ${eur(m.budgetMonthlyCents)}`,spentPct,spendCol)
  ));

  // board table
  const tbl=el('table',{class:'board'});
  tbl.append(el('thead',{},el('tr',{},...['Ruolo','Stato','Autonomia','Focus attuale','OK / issue','Budget','Azioni'].map(h=>el('th',{},h)))));
  const tb=el('tbody');
  DATA.agents.forEach(a=>{
    const st=a.charts.status, done=st.done, total=done+st.in_progress+st.in_review+st.blocked;
    const tr=el('tr',{class:'click',onclick:()=>go(`#/agent/${a.id}`)},
      el('td',{},el('div',{class:'role'},el('span',{class:'av'},AV[a.role]||'•'),el('div',{},el('div',{class:'rr'},a.role),el('div',{class:'tt'},a.title)))),
      el('td',{},agentPill(a.status)),
      el('td',{},autonomyChip(a.autonomy)),
      el('td',{class:'focus'},a.currentFocus),
      el('td',{class:'num'},`${done}/${total}`),
      el('td',{class:'num'},eur(a.spentCents)),
      el('td',{onclick:e=>e.stopPropagation()},
        el('button',{class:'btn icon',title:'Invoke',onclick:()=>stub(a.role+' · Invoke')},'▶'),' ',
        el('button',{class:'btn icon',title:'Pause',onclick:()=>stub(a.role+' · Pause')},'⏸'))
    );
    tb.append(tr);
  });
  tbl.append(tb);
  main.append(el('div',{class:'card',style:'margin-bottom:22px'},el('h3',{},'Board C-Level'),tbl));

  // companies
  main.append(el('div',{class:'sub',style:'margin:0 0 12px;color:var(--ink);font-weight:700;font-size:14px'},'Aziende'));
  const grid=el('div',{class:'companies',style:'margin-bottom:22px'});
  DATA.companies.forEach(co=>grid.append(companyCard(co)));
  main.append(grid);

  // platform
  const pl=el('div',{class:'card'},el('h3',{},'Piattaforma condivisa'));
  const prow=el('div',{style:'display:flex;flex-wrap:wrap;gap:10px'});
  DATA.platform.forEach(p=>prow.append(el('span',{class:'chip'},`${p.name} · ${p.owner} · ${p.status}`)));
  pl.append(prow);main.append(pl);
  window.scrollTo(0,0);
}
function tile(k,v,small){return el('div',{class:'tile'},el('div',{class:'k'},k),el('div',{class:'v'},v,small?el('small',{},' '+small):null));}
function tileMeter(k,v,small,pct,col){const t=el('div',{class:'tile'},el('div',{class:'k'},k),el('div',{class:'v'},v,el('small',{},' '+small)));const mtr=el('div',{class:'meter'});mtr.append(el('i',{style:`width:${pct}%;background:${col}`}));t.append(mtr);return t;}
function companyCard(co){
  const c=el('div',{class:'co',onclick:()=>go(`#/company/${co.id}`)},
    el('div',{class:'top'},el('span',{class:'cdot',style:`background:${CO_COLORS[co.id]||'var(--muted)'}`}),el('span',{class:'nm'},co.name),el('span',{style:'margin-left:auto'},coStatePill(co.status))),
    el('div',{class:'desc'},co.desc||co.description||''));
  const foot=el('div',{class:'foot'});
  foot.append(el('span',{class:'chip'},'priority: '+co.priority));
  foot.append(el('span',{},`${co.agents.length} agent`));
  if(co.health!=null){const col=co.health>=66?'var(--ok)':co.health>=40?'var(--warn)':'var(--crit)';foot.append(el('span',{style:'margin-left:auto;color:'+col},'health '+co.health));}
  c.append(foot);return c;
}

/* ---------- agent detail ---------- */
function viewAgent(id){
  const a=DATA.agents.find(x=>x.id===id);if(!a)return viewOverview();
  const main=$('#main');main.innerHTML='';
  main.append(topbar([['Board',()=>go('#/overview')],[a.role,null]]));
  main.append(seedbar());
  // head
  main.append(el('div',{class:'ad-head'},
    el('div',{class:'av'},AV[a.role]||'•'),
    el('div',{},el('div',{class:'rr'},a.role),el('div',{class:'tt'},a.title+' · riporta a '+(a.reportsTo?a.reportsTo.toUpperCase():'—'))),
    el('div',{class:'actions'},
      el('button',{class:'btn',onclick:()=>stub(a.role+' · Assign Task')},'＋ Assign Task'),
      el('button',{class:'btn pri',onclick:()=>stub(a.role+' · Invoke')},'▶ Invoke'),
      el('button',{class:'btn',onclick:()=>stub(a.role+' · Pause')},'⏸ Pause'),
      agentPill(a.status))
  ));
  // autonomy + focus line
  main.append(el('div',{class:'sub',style:'margin-top:-8px;display:flex;gap:14px;align-items:center;flex-wrap:wrap'},
    el('span',{},'Autonomia: '),autonomyChip(a.autonomy),
    el('span',{style:'color:var(--muted)'},'· Focus: '+a.currentFocus),
    el('span',{style:'margin-left:auto'},el('span',{class:'chip'},'Budget '+eur(a.spentCents)+' / '+eur(a.budgetCents)))));

  // latest run
  const r=a.latestRun;
  main.append(el('div',{class:'run'},
    el('div',{class:'r1'},
      el('span',{class:'pill',style:`color:${RUN_STATE[r.status]||'var(--muted)'};border-color:${(RUN_STATE[r.status]||'#888')}44`},el('span',{class:'dot',style:`background:${RUN_STATE[r.status]||'#888'}`}),r.status),
      el('span',{class:'hash'},r.id),
      el('span',{class:'chip'},'trigger: '+r.trigger),
      el('span',{class:'ago'},r.agoText)),
    el('div',{class:'msg'},r.msg||r.message)));

  // charts
  const ch=a.charts;
  const runItems=[{key:'ok',color:'var(--ok)'},{key:'fail',color:'var(--crit)'}];
  const runSvg=dayStackChart(ch.runActivity,runItems,(row)=>`<b>${row.d}</b> · ${row.ok} ok${row.fail?` · <span style="color:var(--crit)">${row.fail} fail</span>`:''}`);
  const runOk=ch.runActivity.reduce((s,x)=>s+x.ok,0), runFail=ch.runActivity.reduce((s,x)=>s+x.fail,0);
  const prioItems=PRIO.map(([k,lab,col])=>({lab,val:ch.priority[k]||0,color:col}));
  const statItems=STAT.map(([k,lab,col])=>({lab,val:ch.status[k]||0,color:col}));
  // success rate as green(ok%)+red(shortfall)
  const srRows=ch.successRate.map(x=>({d:x.d,ok:x.ok,gap:100-x.ok}));
  const srItems=[{key:'ok',color:'var(--ok)'},{key:'gap',color:'var(--crit)'}];
  const srSvg=dayStackChart(srRows,srItems,(row)=>`<b>${row.d}</b> · ${row.ok}% success`);
  const avgSr=Math.round(ch.successRate.reduce((s,x)=>s+x.ok,0)/ch.successRate.length);

  main.append(el('div',{class:'charts'},
    chartCard('Run Activity',runSvg,legend([{lab:'Succeeded',val:runOk,color:'var(--ok)'},{lab:'Failed',val:runFail,color:'var(--crit)'}])),
    chartCard('Issues by Priority',catBars(prioItems),legend(prioItems)),
    chartCard('Issues by Status',catBars(statItems),legend(statItems)),
    chartCard('Success Rate',srSvg,legend([{lab:'media',val:avgSr+'%',color:'var(--ok)'}]))
  ));

  // recent issues
  const box=el('div',{class:'card'},el('div',{style:'display:flex;align-items:center'},el('h3',{style:'margin:0'},'Issue recenti'),el('span',{class:'seealso',onclick:()=>stub('Issues')},'Vedi tutte →')));
  const list=el('div',{class:'issues'});
  a.recentIssues.forEach(i=>list.append(el('div',{class:'irow'},el('span',{class:'key'},i.key),el('span',{class:'ttl'},i.title),el('span',{class:'st'},issueStatusPill(i.status)))));
  box.append(list);main.append(box);
  window.scrollTo(0,0);
}

/* ---------- company detail ---------- */
function viewCompany(id){
  const co=DATA.companies.find(x=>x.id===id);if(!co)return viewOverview();
  const main=$('#main');main.innerHTML='';
  main.append(topbar([['Aziende',()=>go('#/overview')],[co.name,null]]));
  main.append(seedbar());
  main.append(el('div',{class:'ad-head'},
    el('div',{class:'av',style:`background:${(CO_COLORS[co.id]||'#333')}22;border-color:${CO_COLORS[co.id]||'#444'}`},el('span',{class:'cdot',style:`background:${CO_COLORS[co.id]||'#888'};width:16px;height:16px`})),
    el('div',{},el('div',{class:'rr'},co.name),el('div',{class:'tt'},co.description)),
    el('div',{class:'actions'},coStatePill(co.status),el('span',{class:'chip'},'priority: '+co.priority),
      el('button',{class:'btn',onclick:()=>stub(co.name+' · Nuova Issue')},'＋ Issue'))));
  if(co.health!=null){const col=co.health>=66?'var(--ok)':co.health>=40?'var(--warn)':'var(--crit)';
    main.append(el('div',{class:'kpis'},tileMeter('Health',co.health+'',' / 100',co.health,col),tile('Agent / servizi',co.agents.length+'',''),tile('Stato',co.status,'')));}
  if(co.agents.length){
    const tbl=el('table',{class:'board'});
    tbl.append(el('thead',{},el('tr',{},...['Servizio / agent','Porta','Stato'].map(h=>el('th',{},h)))));
    const tb=el('tbody');
    co.agents.forEach(ag=>tb.append(el('tr',{},el('td',{},el('div',{class:'role'},el('span',{class:'av',style:'font-size:12px'},'⛭'),el('div',{class:'rr'},ag.name))),el('td',{class:'num'},ag.port||'—'),el('td',{},el('span',{class:'chip'},ag.status)))));
    tbl.append(tb);
    main.append(el('div',{class:'card'},el('h3',{},'Servizi & agent'),tbl));
  }else{
    main.append(el('div',{class:'card'},el('div',{style:'color:var(--muted)'},'Nessun agent registrato ancora per questa azienda.')));
  }
  window.scrollTo(0,0);
}

/* ---------- shared bits ---------- */
function topbar(crumbs){
  const t=el('div',{class:'topbar'});
  crumbs.forEach((c,i)=>{
    if(i)t.append(el('span',{class:'crumb'},'  ›  '));
    const [lab,fn]=c;
    t.append(fn?el('span',{class:'crumb',style:'cursor:pointer',onclick:fn},lab):el('span',{class:'crumb'},el('b',{},lab)));
  });
  t.append(el('div',{class:'right'},el('button',{class:'btn',onclick:()=>stub('Nuova Issue')},'✎ Nuova Issue')));
  return t;
}
function seedbar(){
  if(DATA.meta.telemetrySource!=='seed')return document.createComment('');
  return el('div',{class:'seedbar'},el('span',{},'⚠'),el('span',{html:`<b>Dati telemetria = esempio.</b> ${esc(DATA.meta.telemetryNote||'')}`}));
}

/* ---------- router ---------- */
function go(route){location.hash=route;}
function render(){
  const h=location.hash||'#/overview';
  markActive(h.startsWith('#/agent/')||h.startsWith('#/company/')?h:'#/overview');
  if(h.startsWith('#/agent/'))return viewAgent(h.split('/')[2]);
  if(h.startsWith('#/company/'))return viewCompany(h.split('/')[2]);
  markActive('#/overview');
  viewOverview();
}
window.addEventListener('hashchange',render);
document.querySelectorAll('[data-route="#/overview"]').forEach(n=>n.addEventListener('click',()=>go('#/overview')));
document.querySelectorAll('[data-nav]').forEach(n=>n.addEventListener('click',()=>stub(n.textContent.trim())));

/* ---------- boot ---------- */
function boot(d){DATA=d;renderSidebar();render();}
function loadErr(msg){$('#main').innerHTML='';$('#main').append(el('div',{class:'err'},el('h3',{},'Impossibile caricare i dati ('+msg+')'),
  el('p',{},'La console va servita via HTTP (nginx o `python3 -m http.server`), non aperta con file:// — il browser blocca fetch() sui file locali.')));}
const _bs=document.getElementById('bootstrap');
if(_bs){try{boot(JSON.parse(_bs.textContent));}catch(e){loadErr(e.message);}}
else fetch('./data.json',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(boot).catch(err=>loadErr(err.message));
</script>
</body>
