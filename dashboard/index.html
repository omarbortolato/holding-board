<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Holding Board — Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --blue: #388bfd;
    --red: #f85149;
    --purple: #bc8cff;
    --orange: #db6d28;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: linear-gradient(135deg, #388bfd, #bc8cff);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: white;
  }
  .logo-text h1 { font-size: 16px; font-weight: 600; }
  .logo-text span { font-size: 12px; color: var(--text-muted); }
  .header-meta { display: flex; align-items: center; gap: 16px; }
  .last-updated { font-size: 12px; color: var(--text-muted); }
  .focus-badge {
    background: rgba(210, 153, 34, 0.15);
    border: 1px solid rgba(210, 153, 34, 0.4);
    color: #d29922;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }

  /* LAYOUT */
  main { padding: 32px; max-width: 1400px; margin: 0 auto; }

  /* SECTION */
  .section { margin-bottom: 40px; }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ORG CHART */
  .org-chart {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    margin-bottom: 40px;
  }

  .org-ceo {
    background: linear-gradient(135deg, rgba(56, 139, 253, 0.15), rgba(188, 140, 255, 0.15));
    border: 1px solid rgba(56, 139, 253, 0.4);
    border-radius: 12px;
    padding: 16px 32px;
    text-align: center;
    min-width: 200px;
  }
  .org-ceo .role { font-size: 20px; font-weight: 700; color: var(--accent); }
  .org-ceo .name { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .org-connector-v {
    width: 2px; height: 24px;
    background: var(--border);
  }
  .org-connector-h {
    display: flex;
    align-items: flex-start;
    gap: 0;
    position: relative;
  }
  .org-connector-h::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    height: 2px;
    background: var(--border);
  }

  .org-clevel-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .org-branch {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .org-branch-line {
    width: 2px; height: 24px;
    background: var(--border);
  }

  /* C-LEVEL CARDS */
  .clevel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .clevel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .clevel-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .clevel-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .clevel-card.in-progress::before { background: var(--yellow); }
  .clevel-card.planned::before { background: var(--blue); }
  .clevel-card.active::before { background: var(--green); }
  .clevel-card.at-risk::before { background: var(--red); }

  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-role { font-size: 22px; font-weight: 700; }
  .card-status-badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 12px;
    font-weight: 500;
  }
  .badge-in-progress { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge-planned { background: rgba(56,139,253,0.15); color: var(--blue); }
  .badge-active { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-at-risk { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-mvp { background: rgba(188,140,255,0.15); color: var(--purple); }

  .card-fullname { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
  .card-focus { font-size: 13px; color: var(--text); margin-bottom: 12px; line-height: 1.4; }

  .autonomy-bar { margin-top: 12px; }
  .autonomy-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .autonomy-track { height: 4px; background: var(--border); border-radius: 2px; }
  .autonomy-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
  .autonomy-supervised { background: var(--red); width: 10%; }
  .autonomy-delegated { background: var(--yellow); width: 50%; }
  .autonomy-autonomous { background: var(--green); width: 100%; }

  .okr-bar { margin-top: 8px; }
  .okr-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .okr-track { height: 4px; background: var(--border); border-radius: 2px; }
  .okr-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s; }

  /* PROJECTS */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    transition: all 0.2s;
  }
  .project-card:hover {
    border-color: rgba(88, 166, 255, 0.4);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  .project-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .project-name { font-size: 18px; font-weight: 700; }
  .project-priority { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .project-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }

  .health-score {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .health-number {
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
  }
  .health-number.good { color: var(--green); }
  .health-number.mid { color: var(--yellow); }
  .health-number.bad { color: var(--red); }
  .health-number.null-score { color: var(--text-muted); font-size: 20px; }
  .health-label { font-size: 11px; color: var(--text-muted); }

  .agents-list { margin-top: 12px; }
  .agents-title { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
  .agent-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .agent-item:last-child { border-bottom: none; }
  .agent-name { font-family: monospace; }
  .agent-port { color: var(--text-muted); font-family: monospace; }
  .agent-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-prd { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-dev { background: var(--yellow); }
  .dot-planned { background: var(--border); }

  /* PLATFORM */
  .platform-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .platform-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .platform-name { font-weight: 600; margin-bottom: 4px; font-family: monospace; font-size: 13px; }
  .platform-owner { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
  .platform-status { font-size: 11px; }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 32px;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* DETAIL PANEL */
  .panel-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  .panel-overlay.open { display: flex; align-items: center; justify-content: flex-end; }
  .side-panel {
    background: var(--surface);
    border-left: 1px solid var(--border);
    width: 400px;
    max-width: 90vw;
    height: 100vh;
    overflow-y: auto;
    padding: 32px;
    transform: translateX(100%);
    transition: transform 0.3s ease;
  }
  .panel-overlay.open .side-panel { transform: translateX(0); }
  .panel-close {
    background: none; border: 1px solid var(--border);
    color: var(--text); cursor: pointer; padding: 6px 12px;
    border-radius: 6px; font-size: 12px; margin-bottom: 24px;
  }
  .panel-role { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
  .panel-fullname { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
  .panel-section { margin-bottom: 20px; }
  .panel-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px; }
  .panel-content { font-size: 13px; line-height: 1.6; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    main { padding: 16px; }
    header { padding: 12px 16px; }
    .focus-badge { display: none; }
    .clevel-grid { grid-template-columns: 1fr; }
    .projects-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">H</div>
    <div class="logo-text">
      <h1>AI Holding Board</h1>
      <span id="lastUpdated">—</span>
    </div>
  </div>
  <div class="header-meta">
    <span class="focus-badge" id="weeklyFocus">—</span>
  </div>
</header>

<main>

  <!-- C-LEVEL BOARD -->
  <div class="section">
    <div class="section-title">C-Level Board</div>
    <div class="clevel-grid" id="clevels"></div>
  </div>

  <!-- PROGETTI -->
  <div class="section">
    <div class="section-title">Progetti</div>
    <div class="projects-grid" id="projects"></div>
  </div>

  <!-- PLATFORM -->
  <div class="section">
    <div class="section-title">Platform condivisa</div>
    <div class="platform-grid" id="platform"></div>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> ACTIVE / PRD</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> IN PROGRESS / MVP</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div> PLANNED</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> AT RISK</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div> MVP</div>
    <div class="legend-item" style="margin-left:auto; color: var(--text-muted); font-size:11px;">
      Auto-refresh ogni 60s • dati da data.json
    </div>
  </div>

</main>

<!-- DETAIL PANEL -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel(event)">
  <div class="side-panel" id="sidePanel">
    <button class="panel-close" onclick="closePanelDirect()">✕ Chiudi</button>
    <div class="panel-role" id="panelRole">—</div>
    <div class="panel-fullname" id="panelFullName">—</div>
    <div id="panelBody"></div>
  </div>
</div>

<script>
let data = null;

async function loadData() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    data = await r.json();
    render();
  } catch(e) {
    console.error('Errore caricamento data.json', e);
  }
}

function statusLabel(s) {
  const map = {
    'active': 'ACTIVE', 'in-progress': 'IN PROGRESS', 'planned': 'PLANNED',
    'at-risk': 'AT RISK', 'mvp': 'MVP', 'partial': 'PARZIALE', 'prd': 'PRD'
  };
  return map[s] || s.toUpperCase();
}

function badgeClass(s) {
  const map = {
    'active': 'active', 'in-progress': 'in-progress', 'planned': 'planned',
    'at-risk': 'at-risk', 'mvp': 'mvp', 'prd': 'active', 'partial': 'in-progress'
  };
  return 'badge-' + (map[s] || 'planned');
}

function cardClass(s) {
  const map = {
    'active': 'active', 'in-progress': 'in-progress', 'planned': 'planned',
    'at-risk': 'at-risk', 'mvp': 'in-progress'
  };
  return map[s] || 'planned';
}

function healthColor(score) {
  if (score === null) return 'null-score';
  if (score >= 70) return 'good';
  if (score >= 40) return 'mid';
  return 'bad';
}

function agentDot(status) {
  const map = { prd: 'prd', dev: 'dev', planned: 'planned' };
  return 'dot-' + (map[status] || 'planned');
}

function priorityLabel(p) {
  const map = { high: '🔥 HIGH', medium: '📅 MEDIUM', low: '🔵 LOW', tbd: '— TBD' };
  return map[p] || p;
}

function platformStatusLabel(s) {
  const map = { planned: '🔵 Pianificato', partial: '🟡 Parziale', active: '🟢 Attivo' };
  return map[s] || s;
}

function render() {
  document.getElementById('lastUpdated').textContent = 'Aggiornato: ' + data.lastUpdated;
  document.getElementById('weeklyFocus').textContent = '⚡ ' + data.weeklyFocus;

  // C-LEVEL
  const clevels = document.getElementById('clevels');
  clevels.innerHTML = data.board.map((b, i) => `
    <div class="clevel-card ${cardClass(b.status)}" onclick="openCLevelPanel(${i})">
      <div class="card-header">
        <div class="card-role">${b.role}</div>
        <span class="card-status-badge ${badgeClass(b.status)}">${statusLabel(b.status)}</span>
      </div>
      <div class="card-fullname">${b.fullName}</div>
      <div class="card-focus">${b.currentFocus}</div>
      <div class="autonomy-bar">
        <div class="autonomy-label">
          <span>Autonomia: ${b.autonomy.toUpperCase()}</span>
        </div>
        <div class="autonomy-track">
          <div class="autonomy-fill autonomy-${b.autonomy}"></div>
        </div>
      </div>
      <div class="okr-bar">
        <div class="okr-label">
          <span>OKR settimana</span>
          <span>${b.okrCompletion}%</span>
        </div>
        <div class="okr-track">
          <div class="okr-fill" style="width:${b.okrCompletion}%"></div>
        </div>
      </div>
    </div>
  `).join('');

  // PROJECTS
  const projects = document.getElementById('projects');
  projects.innerHTML = data.projects.map((p, i) => `
    <div class="project-card">
      <div class="project-header">
        <div>
          <div class="project-name">${p.name}</div>
          <div class="project-priority">${priorityLabel(p.priority)}</div>
        </div>
        <span class="card-status-badge ${badgeClass(p.status)}">${statusLabel(p.status)}</span>
      </div>
      <div class="project-desc">${p.description}</div>
      <div class="health-score">
        <div class="health-number ${healthColor(p.health)}">${p.health !== null ? p.health : '—'}</div>
        <div class="health-label">
          ${p.health !== null ? 'Health score<br>(0–100)' : 'Health score<br>non disponibile'}
        </div>
      </div>
      ${p.agents.length > 0 ? `
        <div class="agents-list">
          <div class="agents-title">Agenti AI (${p.agents.length})</div>
          ${p.agents.map(a => `
            <div class="agent-item">
              <div class="agent-dot ${agentDot(a.status)}"></div>
              <span class="agent-name">${a.name}</span>
              <span class="agent-port">:${a.port}</span>
              <span class="card-status-badge ${badgeClass(a.status)}" style="font-size:10px">${statusLabel(a.status)}</span>
            </div>
          `).join('')}
        </div>
      ` : `<div style="font-size:12px;color:var(--text-muted);margin-top:8px;">Nessun agente AI configurato</div>`}
    </div>
  `).join('');

  // PLATFORM
  const platform = document.getElementById('platform');
  platform.innerHTML = data.platform.map(p => `
    <div class="platform-card">
      <div class="platform-name">${p.name}</div>
      <div class="platform-owner">Owner: ${p.owner}</div>
      <div class="platform-status">${platformStatusLabel(p.status)}</div>
    </div>
  `).join('');
}

function openCLevelPanel(idx) {
  const b = data.board[idx];
  document.getElementById('panelRole').textContent = b.role;
  document.getElementById('panelFullName').textContent = b.fullName;
  document.getElementById('panelBody').innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">Status</div>
      <div class="panel-content">
        <span class="card-status-badge ${badgeClass(b.status)}">${statusLabel(b.status)}</span>
        &nbsp;
        <span style="font-size:12px;color:var(--text-muted)">Autonomia: ${b.autonomy.toUpperCase()}</span>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Focus attuale</div>
      <div class="panel-content">${b.currentFocus}</div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">OKR settimana</div>
      <div class="panel-content">
        <div style="font-size:24px;font-weight:700;color:var(--accent)">${b.okrCompletion}%</div>
        <div class="okr-track" style="margin-top:8px">
          <div class="okr-fill" style="width:${b.okrCompletion}%"></div>
        </div>
      </div>
    </div>
    <div class="panel-section" style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border)">
      <div class="panel-section-title">Documentazione</div>
      <div class="panel-content" style="color:var(--text-muted);font-size:12px">
        📄 board/${b.role.toLowerCase()}/AGENT.md<br>
        📊 board/${b.role.toLowerCase()}/okr.md<br>
        📋 board/${b.role.toLowerCase()}/log.md
      </div>
    </div>
  `;
  document.getElementById('panelOverlay').classList.add('open');
}

function closePanel(e) {
  if (e.target === document.getElementById('panelOverlay')) closePanelDirect();
}
function closePanelDirect() {
  document.getElementById('panelOverlay').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanelDirect(); });

// Load & auto-refresh
loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
