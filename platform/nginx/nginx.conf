worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Dimensione massima body — chat messages non superano 64k
    client_max_body_size 64k;

    # Nasconde la versione di Nginx negli header di risposta
    server_tokens off;

    # IP reali tramite Cloudflare proxy
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # Rate limiting — adeguato a una chat: max 20 msg/min per IP
    # burst=5 nodelay: fino a 5 messaggi rapidi, poi limite 20/min
    limit_req_zone $binary_remote_addr zone=chat:10m rate=20r/m;
    limit_req_status 429;

    # DNS resolver Docker interno con TTL breve.
    # Le variabili in proxy_pass forzano nginx a ri-risolvere il nome ad ogni
    # richiesta entro il TTL — nessun 502 dopo restart di un container.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ─── herbago.info — HTTP → HTTPS redirect ────────────────────────────────
    server {
        listen 80;
        server_name herbago.info www.herbago.info;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name herbago.info www.herbago.info;

        ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        root /var/www/portal;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ─── chat.herbago.info — HTTP → HTTPS redirect ───────────────────────────
    server {
        listen 80;
        server_name chat.herbago.info;
        return 301 https://$host$request_uri;
    }

    # ─── chat.herbago.info — HTTPS ───────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name chat.herbago.info;

        ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location /api/ {
            limit_req zone=chat burst=5 nodelay;

            # Passa il path /api/* invariato al concierge.
            # Il concierge espone sia /webhook che /api/webhook come alias.
            set $concierge http://concierge:8000;
            proxy_pass         $concierge;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout    90s;
            proxy_send_timeout    90s;
            proxy_connect_timeout 10s;
            proxy_socket_keepalive on;
        }

        location /health {
            set $concierge http://concierge:8000;
            proxy_pass $concierge/health;
        }

        location = /dashboard { return 301 /dashboard/; }

        location /dashboard/api/test/ {
            set $analytics http://analytics:8040;
            rewrite ^/dashboard/(.*) /$1 break;
            proxy_pass         $analytics;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        location /dashboard/ {
            set $analytics http://analytics:8040;
            rewrite ^/dashboard/(.*) /$1 break;
            proxy_pass         $analytics;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 30s;
        }

        location / { return 404; }
    }

    # ─── soldi.omarbortolato.it — HTTP → HTTPS redirect ──────────────────────
    server {
        listen 80;
        server_name soldi.omarbortolato.it;

        # ACME challenge per Let's Encrypt (rinnovi futuri)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── soldi.omarbortolato.it — Finanza Dashboard (Next.js su host:3001) ──
    server {
        listen 443 ssl;
        http2 on;
        server_name soldi.omarbortolato.it;

        ssl_certificate     /etc/letsencrypt/live/soldi.omarbortolato.it/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/soldi.omarbortolato.it/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location / {
            proxy_pass http://host.docker.internal:3001;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
            proxy_connect_timeout 10s;
        }
    }
}
