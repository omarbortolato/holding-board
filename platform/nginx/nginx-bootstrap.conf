# Configurazione temporanea HTTP-only per ottenere il certificato SSL
worker_processes auto;
events { worker_connections 1024; }

http {
    server {
        listen 80;
        server_name chat.herbago.info;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 'Herbie AI - SSL setup in progress';
            add_header Content-Type text/plain;
        }
    }
}
